<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PocketSense Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f8fbf7 0%, #fff7ee 100%);
        color: #0f172a;
        font-family: system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 420px);
        border-radius: 28px;
        padding: 32px 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        text-align: center;
      }
      h1 { margin: 0 0 12px; font-size: 2rem; }
      p { margin: 0; line-height: 1.6; color: #475569; }
    </style>
  </head>
  <body>
    <div class="card">
    <h1>PocketSense</h1>
      <p>You&apos;re offline right now. Your recent pages and saved data will come back once your connection returns.</p>
    </div>
  </body>
  </html>
